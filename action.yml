name: 'Git Branch & Tag Validator'
description: 'Validates Git branch naming conventions, generates safe slugs, parses SemVer versions, and structures outputs.'
author: 'christiangt03'
branding:
  icon: 'git-branch'
  color: 'purple'
inputs:
  branch-name:
    description: 'The branch name to validate. Defaults to the current workflow branch.'
    required: false
    default: ''
  allowed-prefixes:
    description: 'Comma-separated list of allowed branch prefixes.'
    required: false
    default: 'feat/,fix/,bugfix/,chore/,docs/,refactor/,release/,hotfix/'
  version-prefix:
    description: 'Prefix used for release/version branches or tags (e.g. "v" in v1.0.0).'
    required: false
    default: 'v'
  fail-on-error:
    description: 'Whether the action should fail (exit with error) if the branch naming validation fails.'
    required: false
    default: 'false'
outputs:
  is-valid:
    description: 'Whether the branch name complies with allowed prefixes and conventions ("true" or "false").'
  branch-type:
    description: 'The prefix/type of the branch detected (e.g. "feat", "fix", "release") or "unknown".'
  safe-slug:
    description: 'A sanitized, URL-safe version of the branch name (slashes replaced with dashes, lowercase).'
  extracted-version:
    description: 'The clean SemVer version string if a version is found in a release branch or tag (e.g. "1.2.3").'
  validation-message:
    description: 'Descriptive textual message summarizing the validation and results.'
runs:
  using: 'node20'
  main: 'dist/index.js'
